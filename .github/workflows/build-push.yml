name: build-and-deploy

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet and Test Generator
        run: |
          go vet ./generator/
          go test ./generator/

      - name: Generate HTML
        run: go run ./generator -in resume.yaml -out /tmp/index.html

  build-push-website:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to edd-cloud registry
        run: echo "${{ secrets.ECLOUD_TOKEN }}" | docker login registry.cloud.eddisonso.com -u eddison --password-stdin

      - name: Build and Push web-service
        uses: docker/build-push-action@v5
        with:
          platforms: linux/arm64
          push: true
          tags: registry.cloud.eddisonso.com/eddison/resume:arm64

  deploy:
    runs-on: ubuntu-latest
    needs: [build-push-website]
    steps:
      - name: Redeploy resume container (stop + start re-pulls :arm64)
        env:
          TOKEN: ${{ secrets.ECLOUD_TOKEN }}
          CID: "fa3eb9bd"
          API: "https://compute.cloud.eddisonso.com/compute/containers"
        run: |
          set -euo pipefail
          curl -fsS -X POST "$API/$CID/stop" -H "Authorization: Bearer $TOKEN"
          # Recreate the pod (re-pulls because pull_policy=Always). The old pod may
          # still be terminating, so retry start until it succeeds.
          for attempt in 1 2 3 4 5; do
            sleep 5
            if curl -fsS -X POST "$API/$CID/start" -H "Authorization: Bearer $TOKEN"; then
              echo "started on attempt $attempt"
              exit 0
            fi
            echo "start attempt $attempt failed; retrying"
          done
          echo "container failed to start after retries" >&2
          exit 1
